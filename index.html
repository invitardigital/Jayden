  <body>
    <div class="background"></div>

    <main>
      <section class="main">
        <div class="decorations" id="decorations">
          <img class="img1" src="media/decorations/bobSponja/bob.png"/>
          <img class="img2" src="media/decorations/bobSponja/patricio.png"/>
          <img class="img4" src="media/decorations/bobSponja/DonCangrejo.png"/>

          <div class="telon" id="telon">
            <button class="sello" id="sello">Abrir Invitación</button>
            <img class="first" id="c" src="media/icons/telon-left.png"/>
            <img class="second" id="telon_hoja3" src="media/icons/telon-right.png"/>
          </div>
        </div>

        <section class="titulo">
          <h1 class="nombre" id="nombre">Jayden</h1>
          <h2>Cumple</h2>
          <img class="edad shake" src="media/numeros/4.png" />
        </section>

        <section class="vestimenta deslizar">
          <span>Desliza para ver más 👇⬇️</span>
        </section>

        <section class="fecha">
          <span id="fecha-refactor"></span>
          <span id="fecha" class="esconder">15.AGO.2026</span>
          <span id="hora">5:00 PM</span>
        </section>

        <section class="faltan">
          <div>
            <span>Faltan</span>
          </div>
        </section>
        <div class="time">
          <section id="countdown">
            <div class="container">
              <div class="countdown-container">
                <p class="segment">
                  <span class="number" id="days"></span
                  ><span class="unit"> Días</span>
                </p>
                <p class="segment">
                  <span class="number" id="hours"></span
                  ><span class="unit"> Horas</span>
                </p>
                <p class="segment">
                  <span class="number" id="minutes"></span
                  ><span class="unit"> Minutos</span>
                </p>
                <p class="segment">
                  <span class="number" id="seconds"></span
                  ><span class="unit"> Segundos</span>
                </p>
              </div>
            </div>
          </section>
        </div>

        <div id="music-player">
          <audio id="audio-player" src="song.mp3"></audio>
          <button id="play-pause-button">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-player-play-filled" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M6 4v16a1 1 0 0 0 1.524 .852l13 -8a1 1 0 0 0 0 -1.704l-13 -8a1 1 0 0 0 -1.524 .852z" stroke-width="0" fill="currentColor"/>              
            </svg>
          </button>
          <input type="range" id="progress-bar" value="0" max="100" />
        </div>

        <section class="vestimenta" id="informacion-container">
          <img src="media/icons/disfras.png" />
          <span id="informacionImportante">
            Niños con disfraz de su personaje favorito
          </span>
        </section>

        <section class="vestimenta" id="informacion-container">
         
          <span id="informacionImportante">
            🏘️ Recepción 5:00 PM <br>
            🌮 Comida 5:30 PM <br>
            🎭 Show 6:00 PM <br>
            🎂 Pastel 6:30 PM  <br>
            👋 Despedida 7:00 PM <br>
          </span>
        </section>

        <section class="buttons">
          <section class="vestimenta descripcion">
            <span> El Vecino </span>
          </section>
          <a id="ubicacion" href="https://maps.app.goo.gl/2We6mCKUiZTubLkf7" 
             target="_blank"
            ><img src="media/icons/pin.svg" />Abrir Ubicación
          </a>

          <a
            id="whatsApp"
            href="https://api.whatsapp.com/send?phone=+5214428234420&amp;text=Hola,%20vi%20la%20invitaci%C3%B3n%20y%20confirmo%20mi%20asistencia"
            target="_blank"
            ><img src="media/icons/whats.svg" />Confirmar Asistencia
          </a>



        </section>

        <section class="leyenda">
          <span>¡Te esperamos!</span>
        </section>
        
      </section>
